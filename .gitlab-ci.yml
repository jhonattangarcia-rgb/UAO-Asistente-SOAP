image: python:3.12-slim-bookworm

stages:
  - check

before_script:
  - apt-get update && apt-get install -y --no-install-recommends ffmpeg libsndfile1 nodejs npm make
  - pip install uv
  - uv sync --extra dev

check:
  stage: check
  script: make check
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
